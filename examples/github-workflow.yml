name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  erix-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Erix Buddy AI Code Reviewer
        uses: ecodrix/erix-buddy@v1
        with:
          # Pick any provider you have a key for. Examples:
          provider: gemini                    # gemini | openai | anthropic | groq | openrouter | ollama | ...
          api-key: ${{ secrets.GEMINI_API_KEY }}
          mode: branch
          branch: origin/${{ github.base_ref }}
          severity: minor
          fail-on-blocking: "true"
          post-pr-comment: "true"
          custom-instructions: |
            Enforce strict TypeScript types.
            Public functions must have JSDoc.
            Reject changes that drop tenant scoping.
