# Canonical PR review workflow.
# Drop into .github/workflows/erix-review.yml

name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

# Cancel previous review when a new push lands on the same PR
concurrency:
  group: erix-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Erix AI Review
    if: |
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-review')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for branch diffs

      - name: Erix AI Code Reviewer
        uses: ecodrix/erix-buddy@v1
        with:
          # Pick any provider you have a key for. Swap as needed.
          provider: gemini
          api-key: ${{ secrets.GEMINI_API_KEY }}
          mode: branch
          branch: origin/${{ github.base_ref }}
          severity: minor
          fail-on-blocking: "true"
          post-pr-comment: "true"
          custom-instructions: |
            Multi-tenant SaaS — every database query must include tenantId.
            Public functions must have JSDoc.
            Reject changes that drop tenant scoping.
